# DeepTutor — single Docker Compose file
#
#   docker compose up -d              # build from Dockerfile (production)
#   docker compose --profile ghcr up -d   # pre-built image (no local build)
#   docker compose --profile dev up -d    # development / hot-reload
#   docker compose --profile analytics up -d
#
# Prerequisites: cp .env.example .env and set LLM_* keys.
# Local LLM on host: use host.docker.internal for LLM_HOST / EMBEDDING_HOST.

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    ports:
      - "${POCKETBASE_PORT:-8090}:8090"
    volumes:
      - ./data/pocketbase:/pb/pb_data
    networks:
      - deeptutor-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  deeptutor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: deeptutor
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    env_file:
      - .env
    environment:
      - LLM_BINDING=${LLM_BINDING:-openai}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_HOST=${LLM_HOST}
      - LLM_API_VERSION=${LLM_API_VERSION:-}
      - DISABLE_SSL_VERIFY=${DISABLE_SSL_VERIFY:-false}
      - EMBEDDING_BINDING=${EMBEDDING_BINDING:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_HOST=${EMBEDDING_HOST}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-3072}
      - EMBEDDING_API_VERSION=${EMBEDDING_API_VERSION:-}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-}
      - BACKEND_PORT=${BACKEND_PORT:-8001}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - ./data/user:/app/data/user
      - ./data/memory:/app/data/memory
      - ./data/knowledge_bases:/app/data/knowledge_bases
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - deeptutor-network

  deeptutor-ghcr:
    profiles: [ghcr]
    image: ghcr.io/hkuds/deeptutor:latest
    pull_policy: always
    container_name: deeptutor
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    env_file:
      - .env
    environment:
      - LLM_BINDING=${LLM_BINDING:-openai}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_HOST=${LLM_HOST}
      - LLM_API_VERSION=${LLM_API_VERSION:-}
      - DISABLE_SSL_VERIFY=${DISABLE_SSL_VERIFY:-false}
      - EMBEDDING_BINDING=${EMBEDDING_BINDING:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_HOST=${EMBEDDING_HOST}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-3072}
      - EMBEDDING_API_VERSION=${EMBEDDING_API_VERSION:-}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-}
      - BACKEND_PORT=${BACKEND_PORT:-8001}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - ./data/user:/app/data/user
      - ./data/memory:/app/data/memory
      - ./data/knowledge_bases:/app/data/knowledge_bases
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - deeptutor-network

  deeptutor-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: deeptutor
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
    env_file:
      - .env
    environment:
      - LLM_BINDING=${LLM_BINDING:-openai}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_HOST=${LLM_HOST}
      - BACKEND_PORT=${BACKEND_PORT:-8001}
    volumes:
      - ./deeptutor:/app/deeptutor:ro
      - ./deeptutor_cli:/app/deeptutor_cli:ro
      - ./scripts:/app/scripts:ro
      - ./data/user:/app/data/user
      - ./data/memory:/app/data/memory
      - ./data/knowledge_bases:/app/data/knowledge_bases
    networks:
      - deeptutor-network

  clickhouse:
    profiles: [analytics]
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: deeptutor-clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - deeptutor-network

  neo4j:
    profiles: [analytics]
    image: neo4j:5-community
    container_name: deeptutor-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme}
    volumes:
      - ./data/neo4j:/data
    networks:
      - deeptutor-network

networks:
  deeptutor-network:
    driver: bridge
