name: deeptutor_mobile
description: DeepTutor — AI-native intelligent tutoring platform (Android)
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking
  dio: ^5.4.3
  web_socket_channel: ^3.0.1
  connectivity_plus: ^6.0.3

  # Auth & Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^14.2.7

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Data Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # UI
  flutter_markdown: ^0.7.3
  flutter_math_fork: ^0.7.2
  flutter_highlight: ^0.7.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.69.0

  # Local Storage (offline cache)
  hive_flutter: ^1.1.0

  # Files & permissions
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  share_plus: ^10.1.2
  url_launcher: ^6.3.1

  # Audio (whiteboard / speech)
  audioplayers: ^6.1.0
  record: ^5.2.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

  # Biometrics & app links
  local_auth: ^2.3.0
  app_links: ^6.3.2

  # Payments (Phase 2)
  razorpay_flutter: ^1.3.6

  # Utils
  intl: ^0.20.2
  logger: ^2.4.0
  equatable: ^2.0.5
  uuid: ^4.4.2

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.4
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # fonts:
  #   - family: JetBrainsMono
  #     fonts:
  #       - asset: assets/fonts/JetBrainsMono-Regular.ttf
  #       - asset: assets/fonts/JetBrainsMono-Bold.ttf
  #         weight: 700
  # Uncomment when JetBrainsMono .ttf files are added to assets/fonts/

  generate: true
